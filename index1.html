<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicken Photo</title>
  <style>
    :root {
      --bg-a: #fff7cc;
      --bg-b: #ffd86f;
      --ink: #1e1e1e;
      --card: rgba(255, 255, 255, 0.88);
      --shadow: 0 16px 42px rgba(30, 30, 30, 0.22);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 239, 169, 0.5), transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(255, 199, 48, 0.35), transparent 30%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      padding: 1.25rem;
    }

    .photo-wrap {
      width: min(980px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 14px;
      border: 1px solid rgba(30, 30, 30, 0.1);
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      margin-bottom: 0.75rem;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <main class="photo-wrap">
    <h1>Chicken Photo</h1>
    <img
      src="https://source.unsplash.com/1600x1000/?chicken,hen,rooster"
      alt="A chicken photo"
    />
  </main>
</body>
</html>
